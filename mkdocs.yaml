site_name: repolish
site_description: A hybrid templating and diff/patch system for maintaining repository consistency while preserving local customizations.
site_url: https://hotdog-werx.github.io/repolish
repo_url: https://github.com/hotdog-werx/repolish
repo_name: hotdog-werx/repolish

nav:
  - Home: index.md

  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md

  - How It Works:
      - Overview: how-it-works/overview.md
      - Providers: how-it-works/providers.md
      - Templates: how-it-works/templates.md
      - Preprocessors: how-it-works/preprocessors.md
      - Context: how-it-works/context.md
      - File Modes: how-it-works/file-modes.md

  - Developer Control:
      - You Are in Charge: developer-control/index.md
      - Pause a File: developer-control/pause.md
      - Override a Template: developer-control/template-overrides.md
      - Override Context: developer-control/context-overrides.md
      - Local Providers: developer-control/local-providers.md
      - Preserve Your Edits: developer-control/anchors.md

  - Configuration:
      - repolish.yaml: configuration/config-file.md
      - Provider Settings: configuration/providers.md
      - Anchors & Overrides: configuration/overrides.md

  - CLI Reference:
      - repolish apply / check: operations/cli.md
      - repolish link: operations/link.md
      - repolish-debugger: operations/debugger.md

  - Guides:
      - Writing a Provider: guides/writing-a-provider.md
      - Monorepo Setup: guides/monorepo.md
      - Mode Handlers: guides/mode-handler.md
      - Provider Patterns: guides/patterns.md
      - Resource Linker: guides/linker.md

# Configuration
theme:
  name: material
  features:
    - announce.dismiss
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: lucide/moon-star
        name: Switch to light mode
  # favicon: assets/zensical.png
  # logo: assets/zensical.svg
  icon:
    tag:
      default: lucide/hash

# Plugins
plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hotdog-werx
