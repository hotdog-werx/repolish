# Demonstrates both anchor mechanisms:
#
#   repolish-start/end  (block anchor)
#     The replacement text comes from config.anchors (or create_anchors()).
#     The target file is NOT read for this — it is purely config-driven.
#
#   repolish-regex      (regex anchor)
#     The pattern runs against the target file to capture a value
#     (e.g. a version the developer already bumped). That captured
#     value replaces the default in the template.

template: |
  # generated by repolish — do not edit above the markers
  __version__ = "0.0.0"
  ## repolish-regex[version]: ^__version__\s*=\s*"(.+?)"$
  __author__ = "default author"
  ## repolish-regex[author]: ^__author__\s*=\s*"(.+?)"$

  # --- install extras (owned by provider via create_anchors) ---
  ## repolish-start[install-extras]
  pip install -e ".[dev]"
  ## repolish-end[install-extras]

target: |
  __version__ = "1.3.7"
  __author__ = "Jane Developer"

  # local customization
  ## repolish-start[install-extras]
  pip install -e ".[dev,docs,gpu]"
  ## repolish-end[install-extras]

config:
  anchors:
    # Block anchor replacement comes from provider code (create_anchors)
    # or from config.anchors like here — NOT from the target file.
    install-extras: |
      pip install -e ".[dev,docs,gpu]"
