[tool.poe]
include = [
  ".pkglink/.codeguide/poe/formatters.toml",
  ".pkglink/.codeguide/poe/ci-checks.toml",
  ".pkglink/.codeguide/poe/dev-setup.toml",
  ".pkglink/.codeguide/poe/docs.toml",
  ".pkglink/.codeguide/poe/repo-tasks.toml",
]

[tool.poe.tasks]
ci-checks.help = "run all checks for CI"
ci-checks.sequence = [
  "check-dprint",
  "check-python",
  "check-ty",
  "check-complexity",
  "check-coverage",
]

[tool.poe.tasks.install-devkit-providers]
help = "install all example providers in editable mode"
cmd = "uv pip install -e provider-examples/devkit/workspace -e provider-examples/devkit/python -e provider-examples/simple-provider -e provider-examples/scaffold-provider"
